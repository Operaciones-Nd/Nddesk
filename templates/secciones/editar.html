{% extends "base.html" %}

{% block title %}Editar Sección - NDvision{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header" style="background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); color: white;">
        <h3 class="card-title"><i class="fas fa-edit mr-2"></i>Editar Sección</h3>
    </div>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="card-body">
            <div class="form-group">
                <label>Nombre de la Sección <span class="text-danger">*</span></label>
                <input type="text" name="nombre" class="form-control" required value="{{ seccion.nombre }}">
            </div>
            <div class="form-group">
                <label>Medio <span class="text-danger">*</span></label>
                <select name="medio" class="form-control" required>
                    <option value="Nuestro Diario" {% if seccion.medio == 'Nuestro Diario' %}selected{% endif %}>Nuestro Diario</option>
                    <option value="Soy502" {% if seccion.medio == 'Soy502' %}selected{% endif %}>Soy502</option>
                </select>
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3">{{ seccion.descripcion or '' }}</textarea>
            </div>
            <div class="form-group">
                <label>Email de Notificación</label>
                <input type="email" name="email_notificacion" class="form-control" value="{{ seccion.email_notificacion or '' }}">
            </div>
        </div>
        <div class="card-footer">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save mr-1"></i>Actualizar</button>
            <a href="{{ url_for('secciones.index') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
