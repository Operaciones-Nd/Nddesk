{% extends "base.html" %}

{% block title %}Editar Departamento - NDvision{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header" style="background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); color: white;">
        <h3 class="card-title"><i class="fas fa-edit mr-2"></i>Editar Departamento</h3>
    </div>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="card-body">
            <div class="form-group">
                <label>Nombre del Departamento <span class="text-danger">*</span></label>
                <input type="text" name="nombre" class="form-control" required value="{{ departamento.nombre }}">
            </div>
            <div class="form-group">
                <label>Email de Notificación</label>
                <input type="email" name="email_notificacion" class="form-control" value="{{ departamento.email_notificacion or '' }}" placeholder="Ej: mercadeo@nuestrodiario.com.gt">
                <small class="text-muted">Email donde se enviarán las notificaciones de tickets de este departamento</small>
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3">{{ departamento.descripcion or '' }}</textarea>
            </div>
        </div>
        <div class="card-footer">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save mr-1"></i>Actualizar</button>
            <a href="{{ url_for('departamentos.index') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
