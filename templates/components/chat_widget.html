<!-- Widget de Chat IA de Ayuda -->
<style>
.chat-widget {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
}

.chat-button {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
    color: white;
    border: none;
    box-shadow: 0 4px 12px rgba(30, 64, 175, 0.4);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    transition: all 0.3s;
}

.chat-button:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 16px rgba(30, 64, 175, 0.5);
}

.chat-window {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 380px;
    height: 500px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    display: none;
    flex-direction: column;
    z-index: 1001;
}

.chat-window.active {
    display: flex;
}

.chat-header {
    background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
    color: white;
    padding: 1rem;
    border-radius: 12px 12px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chat-header h6 {
    margin: 0;
    font-weight: 600;
}

.chat-close {
    background: none;
    border: none;
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    opacity: 0.8;
}

.chat-close:hover {
    opacity: 1;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    background: #f8fafc;
}

.chat-message {
    margin-bottom: 1rem;
    animation: fadeIn 0.3s;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.chat-message.bot {
    text-align: left;
}

.chat-message.user {
    text-align: right;
}

.message-bubble {
    display: inline-block;
    max-width: 80%;
    padding: 0.75rem 1rem;
    border-radius: 12px;
    font-size: 0.875rem;
    line-height: 1.5;
}

.message-bubble.bot {
    background: white;
    color: #1e293b;
    border: 1px solid #e2e8f0;
    text-align: left;
}

.message-bubble.user {
    background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
    color: white;
}

.message-bubble a {
    color: #3b82f6;
    text-decoration: underline;
}

.message-bubble.bot a {
    color: #1e40af;
    font-weight: 600;
}

.chat-input-container {
    padding: 1rem;
    border-top: 1px solid #e2e8f0;
    background: white;
    border-radius: 0 0 12px 12px;
}

.chat-input {
    display: flex;
    gap: 0.5rem;
}

.chat-input input {
    flex: 1;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    font-size: 0.875rem;
}

.chat-input input:focus {
    outline: none;
    border-color: #3b82f6;
}

.chat-input button {
    background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 600;
}

.chat-input button:hover {
    opacity: 0.9;
}

.chat-input button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.typing-indicator {
    display: none;
    padding: 0.5rem 1rem;
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    display: inline-block;
}

.typing-indicator span {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #94a3b8;
    margin: 0 2px;
    animation: typing 1.4s infinite;
}

.typing-indicator span:nth-child(2) {
    animation-delay: 0.2s;
}

.typing-indicator span:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes typing {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-10px); }
}
</style>

<div class="chat-widget">
    <button class="chat-button" id="chatToggle">
        <i class="fas fa-comments"></i>
    </button>
    
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <div>
                <h6><i class="fas fa-robot mr-2"></i>Asistente Virtual</h6>
                <small style="opacity: 0.9; font-size: 0.75rem;">Estoy aquí para ayudarte</small>
            </div>
            <button class="chat-close" id="chatClose">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="chat-message bot">
                <div class="message-bubble bot">
                    ¡Hola! 👋 Soy tu asistente virtual. Puedo ayudarte con:
                    <br><br>
                    • Cómo usar el sistema<br>
                    • Crear y gestionar tickets<br>
                    • Cambiar tu contraseña<br>
                    • Buscar información<br>
                    <br>
                    ¿En qué puedo ayudarte hoy?
                </div>
            </div>
        </div>
        
        <div class="chat-input-container">
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Escribe tu pregunta...">
                <button id="chatSend">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    const chatToggle = $('#chatToggle');
    const chatWindow = $('#chatWindow');
    const chatClose = $('#chatClose');
    const chatInput = $('#chatInput');
    const chatSend = $('#chatSend');
    const chatMessages = $('#chatMessages');
    
    // Toggle chat
    chatToggle.on('click', function() {
        chatWindow.toggleClass('active');
        if (chatWindow.hasClass('active')) {
            chatInput.focus();
        }
    });
    
    chatClose.on('click', function() {
        chatWindow.removeClass('active');
    });
    
    // Enviar mensaje
    function enviarMensaje() {
        const pregunta = chatInput.val().trim();
        if (!pregunta) return;
        
        // Agregar mensaje del usuario
        agregarMensaje(pregunta, 'user');
        chatInput.val('');
        
        // Mostrar indicador de escritura
        mostrarTyping();
        
        // Enviar a la API
        $.ajax({
            url: '/chat/ayuda',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ pregunta: pregunta }),
            success: function(data) {
                ocultarTyping();
                
                // Convertir markdown simple a HTML
                let respuesta = data.respuesta;
                respuesta = respuesta.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                respuesta = respuesta.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>');
                respuesta = respuesta.replace(/\n/g, '<br>');
                
                agregarMensaje(respuesta, 'bot');
            },
            error: function() {
                ocultarTyping();
                agregarMensaje('Lo siento, hubo un error. Por favor intenta de nuevo.', 'bot');
            }
        });
    }
    
    chatSend.on('click', enviarMensaje);
    
    chatInput.on('keypress', function(e) {
        if (e.key === 'Enter') {
            enviarMensaje();
        }
    });
    
    function agregarMensaje(texto, tipo) {
        const mensaje = $('<div class="chat-message ' + tipo + '"></div>');
        const bubble = $('<div class="message-bubble ' + tipo + '"></div>');
        bubble.html(texto);
        mensaje.append(bubble);
        chatMessages.append(mensaje);
        
        // Scroll al final
        chatMessages.scrollTop(chatMessages[0].scrollHeight);
    }
    
    function mostrarTyping() {
        const typing = $('<div class="chat-message bot" id="typing"></div>');
        const bubble = $('<div class="typing-indicator"><span></span><span></span><span></span></div>');
        typing.append(bubble);
        chatMessages.append(typing);
        chatMessages.scrollTop(chatMessages[0].scrollHeight);
    }
    
    function ocultarTyping() {
        $('#typing').remove();
    }
});
</script>
