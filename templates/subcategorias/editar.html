{% extends "base.html" %}

{% block title %}Editar Subcategoría{% endblock %}

{% block content %}
<h4 class="mb-4" style="font-weight: 700; color: #1e293b;">Editar Subcategoría</h4>

<div class="card">
    <div class="card-body">
        <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="nombre" value="{{ subcat.nombre }}" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Servicio</label>
                <select name="servicio_id" class="form-control" required>
                    <option value="">Seleccionar...</option>
                    {% for serv in servicios %}
                    <option value="{{ serv.id }}" {% if subcat.servicio_id == serv.id %}selected{% endif %}>{{ serv.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <div class="form-check">
                    <input type="checkbox" name="activo" class="form-check-input" {% if subcat.activo %}checked{% endif %}>
                    <label class="form-check-label">Activo</label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{{ url_for('subcategorias.index') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
