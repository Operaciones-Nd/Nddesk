{% extends "base.html" %}

{% block title %}Nueva Subcategoría{% endblock %}

{% block content %}
<h4 class="mb-4" style="font-weight: 700; color: #1e293b;">Nueva Subcategoría</h4>

<div class="card">
    <div class="card-body">
        <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="nombre" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Servicio</label>
                <select name="servicio_id" class="form-control" required>
                    <option value="">Seleccionar...</option>
                    {% for serv in servicios %}
                    <option value="{{ serv.id }}">{{ serv.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Crear</button>
            <a href="{{ url_for('subcategorias.index') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
