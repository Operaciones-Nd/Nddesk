{% extends "base.html" %}

{% block title %}Editar Servicio{% endblock %}

{% block content %}
<h4 class="mb-4" style="font-weight: 700; color: #1e293b;">Editar Servicio</h4>

<div class="card">
    <div class="card-body">
        <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="nombre" value="{{ servicio.nombre }}" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3">{{ servicio.descripcion }}</textarea>
            </div>
            <div class="form-group">
                <div class="form-check">
                    <input type="checkbox" name="activo" class="form-check-input" {% if servicio.activo %}checked{% endif %}>
                    <label class="form-check-label">Activo</label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{{ url_for('servicios.index') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
